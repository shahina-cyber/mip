<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard - Complaint System</title>

<style>
:root {
--primary: #4e73df;
--success: #1cc88a;
--dark: #2c3e50;
--light-gray: #f8f9fc;
--sidebar-width: 240px;
}

body {
font-family: 'Segoe UI', Roboto, Arial, sans-serif;
background-color: var(--light-gray);
margin: 0;
color: #333;
}

.sidebar {
width: var(--sidebar-width);
height: 100vh;
background: var(--dark);
position: fixed;
top: 0;
left: 0;
padding-top: 20px;
}

.sidebar h2 {
color: #fff;
text-align: center;
font-size: 18px;
margin-bottom: 30px;
}

.sidebar a {
display: block;
color: #aeb7c2;
padding: 15px 25px;
text-decoration: none;
font-size: 14px;
}

.sidebar a:hover {
background: rgba(255,255,255,0.05);
color: #fff;
}

.header {
background: #fff;
padding: 15px 30px;
margin-left: var(--sidebar-width);
border-bottom: 1px solid #e3e6f0;
}

.content {
margin-left: var(--sidebar-width);
padding: 30px;
}

.card-wrapper {
display: flex;
gap: 20px;
margin-bottom: 30px;
flex-wrap: wrap;
}

.card {
background: #fff;
padding: 20px;
min-width: 200px;
flex: 1;
border-radius: 10px;
border-left: 5px solid var(--primary);
}

.card h3 {
margin: 0;
font-size: 12px;
text-transform: uppercase;
color: var(--primary);
}

.card p {
font-size: 24px;
font-weight: bold;
margin-top: 10px;
}

table {
width: 100%;
background: #fff;
border-collapse: collapse;
}

th, td {
padding: 15px;
border-bottom: 1px solid #e3e6f0;
}

th {
background: #f8f9fc;
color: var(--primary);
}

.status-pending {
color: #f6c23e;
font-weight: bold;
}

.status-resolved {
color: #1cc88a;
font-weight: bold;
}

button {
padding: 6px 14px;
background: var(--success);
color: #fff;
border: none;
border-radius: 5px;
cursor: pointer;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>ADMIN PANEL</h2>
<a href="#dashboard">Dashboard</a>
<a href="#complaints">View Complaints</a>
<a href="login.html" style="color:#e74a3b;">Logout</a>
</div>

<div class="header">
<h2>Complaint Management Dashboard</h2>
</div>

<div class="content">

<div id="dashboard">

<div class="card-wrapper">

<div class="card">
<h3>Total Complaints</h3>
<p id="total">0</p>
</div>

<div class="card" style="border-left-color:#f6c23e;">
<h3>Pending</h3>
<p id="pending">0</p>
</div>

<div class="card" style="border-left-color:#1cc88a;">
<h3>Resolved</h3>
<p id="resolved">0</p>
</div>

</div>

</div>

<div id="complaints">

<h3>Recent Complaints</h3>

<table>

<thead>
<tr>
<th>ID</th>
<th>Title</th>
<th>Category</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="complaintTable"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDyptaMe1PQZgDNJ2OzUILoAhZTJLbpTro",
authDomain: "complaint-system-2-8c113.firebaseapp.com",
databaseURL: "https://complaint-system-2-8c113-default-rtdb.firebaseio.com",
projectId: "complaint-system-2-8c113",
storageBucket: "complaint-system-2-8c113.firebasestorage.app",
messagingSenderId: "220960024495",
appId: "1:220960024495:web:6c6bafc62a0398d3bf715a"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const table = document.getElementById("complaintTable");

const totalEl = document.getElementById("total");
const pendingEl = document.getElementById("pending");
const resolvedEl = document.getElementById("resolved");

const complaintsRef = ref(database,"complaints");

onValue(complaintsRef,(snapshot)=>{

table.innerHTML="";

let total = 0;
let pending = 0;
let resolved = 0;
let index = 101;

snapshot.forEach((childSnapshot)=>{

const data = childSnapshot.val();
const id = childSnapshot.key;

total++;

if(data.status=="Resolved"){
resolved++;
}else{
pending++;
}

let statusClass="status-pending";

if(data.status=="Resolved"){
statusClass="status-resolved";
}

let actionBtn="";

if(data.status=="Resolved"){
actionBtn="<span style='color:#1cc88a;font-weight:bold;'>✔ Resolved</span>";
}else{
actionBtn=`<button onclick="resolveComplaint('${id}')">Resolve</button>`;
}

table.innerHTML += `
<tr>
<td>#${index++}</td>
<td>${data.title}</td>
<td>${data.category}</td>
<td class="${statusClass}">${data.status}</td>
<td>${actionBtn}</td>
</tr>
`;

});

totalEl.innerText = total;
pendingEl.innerText = pending;
resolvedEl.innerText = resolved;

});

window.resolveComplaint = function(id){

const complaintRef = ref(database,"complaints/"+id);

update(complaintRef,{
status:"Resolved"
});

}

</script>

</body>
</html>
