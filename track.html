<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Track Complaint</title>

<style>
:root {
--primary: #4e73df;
--bg-color: #f8f9fc;
--white: #ffffff;
--gray: #858796;
--success: #1cc88a;
--warning: #f6c23e;
--danger: #e74a3b;
}

body {
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background-color:var(--bg-color);
margin:0;
padding:40px;
color:#333;
}

.container{
max-width:900px;
margin:auto;
}

.header-section{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.search-box{
padding:10px 15px;
border:1px solid #d1d3e2;
border-radius:20px;
outline:none;
}

.card{
background:var(--white);
border-radius:12px;
box-shadow:0 0.15rem 1.75rem rgba(0,0,0,0.1);
overflow:hidden;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:#f8f9fc;
color:var(--primary);
font-size:13px;
padding:18px;
text-align:left;
}

td{
padding:15px 18px;
border-bottom:1px solid #e3e6f0;
}

.badge{
padding:6px 12px;
font-size:11px;
font-weight:bold;
border-radius:20px;
}

.status-in-progress{background:#fff4e5;color:#f6c23e;}
.status-resolved{background:#e7f9ed;color:#1cc88a;}
.status-pending{background:#ffeef0;color:#e74a3b;}

.id-text{
font-weight:bold;
color:var(--primary);
}

.btn-back{
text-decoration:none;
font-size:14px;
color:var(--gray);
margin-bottom:15px;
display:inline-block;
}
</style>
</head>

<body>

<div class="container">

<a href="dashboard.html" class="btn-back">← Back to Dashboard</a>

<div class="header-section">
<h2>Track Your Complaints</h2>
<input type="text" class="search-box" placeholder="Search by Title...">
</div>

<div class="card">

<table>

<thead>
<tr>
<th>Complaint ID</th>
<th>Title</th>
<th>Status</th>
</tr>
</thead>

<tbody id="complaintTable"></tbody>

</table>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyDyptaMe1PQZgDNJ2OzUILoAhZTJLbpTro",
authDomain: "complaint-system-2-8c113.firebaseapp.com",
databaseURL: "https://complaint-system-2-8c113-default-rtdb.firebaseio.com",
projectId: "complaint-system-2-8c113",
storageBucket: "complaint-system-2-8c113.firebasestorage.app",
messagingSenderId: "220960024495",
appId: "1:220960024495:web:6c6bafc62a0398d3bf715a"
};

const app = initializeApp(firebaseConfig);
const database = getDatabase(app);

const table = document.getElementById("complaintTable");

const complaintsRef = ref(database,"complaints");

onValue(complaintsRef,(snapshot)=>{

table.innerHTML="";
let index=101;

snapshot.forEach((childSnapshot)=>{

const data = childSnapshot.val();

let statusClass="status-pending";

if(data.status=="Resolved"){
statusClass="status-resolved";
}

if(data.status=="In Progress"){
statusClass="status-in-progress";
}

table.innerHTML += `
<tr>
<td class="id-text">#${index++}</td>
<td>${data.title}</td>
<td><span class="badge ${statusClass}">${data.status}</span></td>
</tr>
`;

});

});

</script>

</body>
</html>
