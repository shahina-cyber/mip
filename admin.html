<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Complaint System</title>

    <style>
        :root {
            --primary: #4e73df;
            --success: #1cc88a;
            --dark: #2c3e50;
            --light-gray: #f8f9fc;
            --sidebar-width: 240px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            color: #333;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--dark);
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
        }

        .sidebar h2 {
            color: #fff;
            text-align: center;
            font-size: 18px;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #aeb7c2;
            padding: 15px 25px;
            text-decoration: none;
            font-size: 14px;
            border-left: 4px solid transparent;
        }

        .sidebar a:hover {
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-left: 4px solid var(--primary);
        }

        /* Header */
        .header {
            background: #fff;
            padding: 15px 30px;
            margin-left: var(--sidebar-width);
            border-bottom: 1px solid #e3e6f0;
        }

        /* Content */
        .content {
            margin-left: var(--sidebar-width);
            padding: 30px;
        }

        /* Cards */
        .card-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .card {
            background: #fff;
            padding: 20px;
            min-width: 200px;
            flex: 1;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
        }

        .card h3 {
            margin: 0;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--primary);
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Table */
        table {
            width: 100%;
            background: #fff;
            border-collapse: collapse;
            border-radius: 10px;
            overflow: hidden;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #e3e6f0;
            text-align: left;
            font-size: 14px;
        }

        th {
            background: #f8f9fc;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 12px;
        }

        .status-pending { color: #f6c23e; font-weight: bold; }
        .status-progress { color: #36b9cc; font-weight: bold; }

        button {
            padding: 6px 14px;
            background: var(--success);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <h2>ADMIN PANEL</h2>
    <a href="#">Dashboard</a>
    <a href="#">View Complaints</a>
    <a href="#">Reports</a>
    <a href="login.html" style="color:#e74a3b;">Logout</a>
</div>

<div class="header">
    <h2>Complaint Management Dashboard</h2>
</div>

<div class="content">

    <div class="card-wrapper">
        <div class="card">
            <h3>Total Complaints</h3>
            <p>120</p>
        </div>
        <div class="card" style="border-left-color:#f6c23e;">
            <h3>Pending</h3>
            <p>45</p>
        </div>
        <div class="card" style="border-left-color:#1cc88a;">
            <h3>Resolved</h3>
            <p>75</p>
        </div>
    </div>

    <h3>Recent Complaints</h3>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Student</th>
                <th>Category</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>Rahul</td>
                <td>Infrastructure</td>
                <td class="status-pending">Pending</td>
                <td><button>Resolve</button></td>
            </tr>
            <tr>
                <td>102</td>
                <td>Anita</td>
                <td>Academic</td>
                <td class="status-progress">In Progress</td>
                <td><button>Resolve</button></td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
