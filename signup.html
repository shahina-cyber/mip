<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(45deg, #0f0c29, #302b63, #24243e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      color: white;
    }

    .box {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 40px;
      border-radius: 20px;
      width: 350px;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border: none;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      background: linear-gradient(to right, #3a7bd5, #00d2ff);
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    #msg {
      margin-top: 15px;
      font-weight: bold;
    }

    a {
      color: #00d2ff;
      text-decoration: none;
    }
  </style>

</head>

<body>

  <div class="box">

    <h2>JOIN US</h2>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="signup()">CREATE ACCOUNT</button>

    <p id="msg"></p>

    <a href="login.html">Already have account? Login</a>

  </div>

  <script type="module">

    import { auth, db, createUserWithEmailAndPassword, doc, setDoc } from "./firebase.js";

    window.signup = async function () {

      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const uid = userCredential.user.uid;

        // Create user document in Firestore to store role
        await setDoc(doc(db, "users", uid), {
          email: email,
          role: "student"
        });

        document.getElementById("msg").innerHTML = "Account Created Successfully 😌";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 2000);

      } catch (error) {
        document.getElementById("msg").innerHTML = error.message;
      }

    }

  </script>
</body>

</html>
