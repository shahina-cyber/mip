<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CMS PRO - Login</title>

    <style>
        :root {
            --primary: #4e73df;
            --primary-dark: #224abe;
            --gray: #858796;
            --danger: #e74a3b;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gradient);
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: white;
            width: 100%;
            max-width: 380px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin: 0;
            color: var(--primary);
        }

        p {
            color: var(--gray);
            font-size: 14px;
        }

        #error-msg {
            display: none;
            background: #ffeef0;
            color: var(--danger);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
            font-weight: bold;
        }

        .role-toggle {
            display: flex;
            background: #f1f3f9;
            padding: 5px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .role-toggle input {
            display: none;
        }

        .role-toggle label {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            color: var(--gray);
            border-radius: 8px;
        }

        .role-toggle input:checked + label {
            background: white;
            color: var(--primary);
        }

        .input-group {
            text-align: left;
            margin-bottom: 15px;
        }

        label {
            font-size: 12px;
            font-weight: bold;
            color: var(--gray);
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 8px;
            border: 2px solid #eee;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: var(--primary-dark);
        }
    </style>
</head>

<body>

<div class="login-card">
    <h2>CMS PRO</h2>
    <p>Login to continue</p>

    <div id="error-msg">Invalid password!</div>

    <div class="role-toggle">
        <input type="radio" name="role" id="student" checked>
        <label for="student">Student</label>

        <input type="radio" name="role" id="admin">
        <label for="admin">Admin</label>
    </div>

    <form id="loginForm">
        <div class="input-group">
            <label>Username</label>
            <input type="text" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" id="passwordField" required>
        </div>

        <button type="submit">Login</button>
    </form>
</div>

<script>
    document.getElementById("loginForm").addEventListener("submit", function(e) {
        e.preventDefault();

        const password = document.getElementById("passwordField").value;
        const isAdmin = document.getElementById("admin").checked;
        const errorMsg = document.getElementById("error-msg");

        errorMsg.style.display = "none";

        if (password === "1234") {
            if (isAdmin) {
                window.location.href = "admin.html";
            } else {
                window.location.href = "dashboard.html";
            }
        } else {
            errorMsg.style.display = "block";
        }
    });
</script>

</body>
</html>
