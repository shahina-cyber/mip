<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CMS PRO - Login</title>

<style>

:root{
--primary:#4e73df;
--primary-dark:#224abe;
--gray:#858796;
--danger:#e74a3b;
--gradient:linear-gradient(135deg,#667eea 0%,#764ba2 100%);
}

*{
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:var(--gradient);
height:100vh;
margin:0;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */

.login-card{
background:white;
width:100%;
max-width:400px;
padding:45px;
border-radius:20px;
box-shadow:0 25px 45px rgba(0,0,0,0.25);
text-align:center;
animation:fade 0.7s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;}
}

.logo{
font-size:32px;
font-weight:800;
color:var(--primary);
margin-bottom:5px;
}

.subtitle{
color:var(--gray);
font-size:14px;
margin-bottom:25px;
}

/* ERROR */

#error-msg{
display:none;
background:#ffeef0;
color:var(--danger);
padding:10px;
border-radius:8px;
margin-bottom:15px;
font-size:13px;
font-weight:bold;
}

/* ROLE SWITCH */

.role-toggle{
display:flex;
background:#f1f3f9;
padding:5px;
border-radius:10px;
margin-bottom:25px;
}

.role-toggle input{
display:none;
}

.role-toggle label{
flex:1;
padding:10px;
cursor:pointer;
font-size:14px;
font-weight:bold;
color:var(--gray);
border-radius:8px;
}

.role-toggle input:checked + label{
background:white;
color:var(--primary);
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* INPUT */

.input-group{
text-align:left;
margin-bottom:18px;
}

label{
font-size:12px;
font-weight:bold;
color:var(--gray);
}

input{
width:100%;
padding:12px;
margin-top:5px;
border-radius:8px;
border:2px solid #eee;
outline:none;
font-size:14px;
transition:0.2s;
}

input:focus{
border-color:var(--primary);
box-shadow:0 0 0 3px rgba(78,115,223,0.1);
}

/* BUTTON */

button{
width:100%;
padding:14px;
background:var(--primary);
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:var(--primary-dark);
transform:translateY(-1px);
}

/* FOOTER */

.footer{
margin-top:15px;
font-size:12px;
color:var(--gray);
}

</style>
</head>

<body>

<div class="login-card">

<div class="logo">CMS PRO</div>
<div class="subtitle">Complaint Management System</div>

<div id="error-msg"></div>

<div class="role-toggle">

<input type="radio" name="role" id="student" checked>
<label for="student">Student</label>

<input type="radio" name="role" id="admin">
<label for="admin">Admin</label>

</div>

<form id="loginForm">

<div class="input-group">
<label>Username</label>
<input type="text" id="username" required>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="passwordField" required>
</div>

<button type="submit">Login</button>

</form>

<div class="footer">
CMS PRO © Complaint System
</div>

</div>

<script>

/* USERS DATABASE */

const users=[

{username:"student1",password:"1234",role:"student"},
{username:"student2",password:"5678",role:"student"},
{username:"student3",password:"1111",role:"student"},

{username:"shahina",password:"admin123",role:"admin"}

];

const form=document.getElementById("loginForm");
const errorMsg=document.getElementById("error-msg");

form.addEventListener("submit",function(e){

e.preventDefault();

const username=document.getElementById("username").value.trim();
const password=document.getElementById("passwordField").value;
const isAdmin=document.getElementById("admin").checked;

errorMsg.style.display="none";

const user=users.find(u=>u.username===username && u.password===password);

if(!user){
showError("Invalid username or password");
return;
}

if(user.role==="admin" && !isAdmin){
showError("Please select Admin login");
return;
}

if(user.role==="student" && isAdmin){
showError("Please select Student login");
return;
}

if(user.role==="admin"){
window.location.href="admin.html";
}else{
window.location.href="dashboard.html";
}

});

function showError(msg){
errorMsg.innerText=msg;
errorMsg.style.display="block";
}

</script>

</body>
</html>
